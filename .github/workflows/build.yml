name: Build

on:
  workflow_dispatch:
  push:
    branches: [main, nightly]
    tags:
      - "v*"
  pull_request:
    branches: [main, nightly]

permissions:
  contents: write

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: bun install --frozen-lockfile
        working-directory: src
      - run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev xdg-utils
      - run: bun run verify
        working-directory: src

  build:
    name: ${{ matrix.name }}
    needs: check
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
          - name: windows-arm64
            os: windows-11-arm
          - name: macos-arm64
            os: macos-latest
          - name: macos-intel
            os: macos-15-intel
          - name: linux-x64
            os: ubuntu-latest
          - name: linux-arm64
            os: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: bun install --frozen-lockfile
        working-directory: src
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf xdg-utils
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "Zenith Codex ${{ github.ref_name }}"
          releaseBody: |
            ## Downloads

            | Architecture | Windows | Ubuntu | macOS |
            |---|---|---|---|
            | x86-64 (64-bit) | [EXE](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/zenith-codex-windows-x64.exe) · [Setup](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/zenith-codex-windows-x64-setup.exe) · [MSI](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/zenith-codex-windows-x64.msi) | [AppImage](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/zenith-codex-linux-x64.AppImage) · [DEB](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/zenith-codex-linux-x64.deb) · [RPM](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/zenith-codex-linux-x64.rpm) | [DMG](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/zenith-codex-macos-intel.dmg) |
            | AArch64 (ARM64) | [EXE](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/zenith-codex-windows-arm64.exe) · [Setup](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/zenith-codex-windows-arm64-setup.exe) · [MSI](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/zenith-codex-windows-arm64.msi) | [AppImage](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/zenith-codex-linux-arm64.AppImage) · [DEB](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/zenith-codex-linux-arm64.deb) · [RPM](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/zenith-codex-linux-arm64.rpm) | [DMG](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/zenith-codex-macos-arm64.dmg) |

            Windows: use **Setup** for normal installation and auto-updates, or **EXE** for a portable launch.

            ## Changelog

            - Added reset to restore a previous Codex provider.
            - Restores the existing window on second launch.
            - Unloads the frontend when the window is hidden to tray.
            - Removes the white startup flash.
            - Refreshes API key statistics automatically.
          releaseDraft: ${{ !startsWith(github.ref, 'refs/tags/') }}
          prerelease: ${{ contains(github.ref_name, 'nightly') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
      - name: Collect release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          function Copy-First($Filter, $Destination) {
            $file = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -File -Filter $Filter | Select-Object -First 1
            if ($file) {
              Copy-Item $file.FullName $Destination
            }
          }
          $patterns = @("*.msi", "*.exe", "*.dmg", "*.app.tar.gz", "*.deb", "*.rpm", "*.AppImage", "*.sig", "latest.json")
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -File |
            Where-Object { $file = $_; $patterns | Where-Object { $file.Name -like $_ } } |
            Copy-Item -Destination artifacts
          if ($env:RUNNER_OS -eq "Windows" -and (Test-Path "src-tauri/target/release/zenith-codex.exe")) {
            Copy-Item "src-tauri/target/release/zenith-codex.exe" "artifacts/zenith-codex-${{ matrix.name }}.exe"
            Copy-First "*.msi" "artifacts/zenith-codex-${{ matrix.name }}.msi"
            Copy-First "*setup.exe" "artifacts/zenith-codex-${{ matrix.name }}-setup.exe"
          }
          if ($env:RUNNER_OS -eq "macOS") {
            Copy-First "*.dmg" "artifacts/zenith-codex-${{ matrix.name }}.dmg"
            Copy-First "*.app.tar.gz" "artifacts/zenith-codex-${{ matrix.name }}.app.tar.gz"
          }
          if ($env:RUNNER_OS -eq "Linux") {
            Copy-First "*.AppImage" "artifacts/zenith-codex-${{ matrix.name }}.AppImage"
            Copy-First "*.deb" "artifacts/zenith-codex-${{ matrix.name }}.deb"
            Copy-First "*.rpm" "artifacts/zenith-codex-${{ matrix.name }}.rpm"
          }
      - name: Upload stable release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Get-ChildItem "artifacts/zenith-codex-${{ matrix.name }}*" -File -ErrorAction SilentlyContinue |
            ForEach-Object { gh release upload $env:GITHUB_REF_NAME $_.FullName --clobber }
      - uses: actions/upload-artifact@v7
        with:
          name: zenith-codex-${{ matrix.name }}
          path: artifacts/*
          if-no-files-found: error
